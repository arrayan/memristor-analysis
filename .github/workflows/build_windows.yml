name: Build and Release Tool

on:
  # Trigger 1: Manual run from the Actions tab
  workflow_dispatch:
  # Trigger 2: Automatic run when a version tag is pushed
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --clean `
            --name "MemristorAnalysisTool" `
            --collect-all PySide6 `
            --collect-all plotly `
            --collect-all duckdb `
            --collect-all kaleido `
            --collect-all matplotlib `
            --collect-all polars `
            --collect-all svglib `
            --paths "src" `
            "src\main.py"

      - name: Run Smoke Test
        shell: pwsh
        run: |
          $exePath = "dist\MemristorAnalysisTool\MemristorAnalysisTool.exe"
          $process = Start-Process -FilePath $exePath -ArgumentList "--smoke-test" -PassThru -NoNewWindow
          Start-Sleep -Seconds 10
          if ($process.HasExited) {
              if ($process.ExitCode -ne 0) { exit 1 }
          } else {
              Stop-Process -Id $process.Id -Force
          }

      - name: Package Artifact
        shell: pwsh
        run: |
          Compress-Archive -Path dist\MemristorAnalysisTool -DestinationPath MemristorAnalysisTool_Windows.zip

      # This step UPLOADS the file so you can download it from the Action Summary page (Manual Run)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MemristorAnalysisTool-Windows
          path: MemristorAnalysisTool_Windows.zip

      # CREATE THE RELEASE
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MemristorAnalysisTool_Windows.zip
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
